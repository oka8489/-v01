// ====================================================================
// Calculation helpers
// ====================================================================
function calcGetPoints(data, item) {
  if (item.linkedTo && item.linkedRate) {
    const parent = ALL_FEES.find(i => i.id === item.linkedTo)
    if (parent) return Math.floor(calcGetPoints(data, parent) * item.linkedRate)
  }
  const e = item.r6; if (!e) return 0
  if (e.fixedPoints != null) return e.fixedPoints
  const sel = data.r6?.[item.id]; if (sel != null) return sel
  if (e.options?.length) return e.options[0].value; return 0
}
function calcGetCount(data, item) { return data.r6?.[item.id + '_cnt'] || 0 }
function calcGetAmountDirect(data, item) { return data.r6?.[item.id + '_amt'] ?? data.r6?.[item.id] ?? 0 }
function calcCategoryTotal(data, items) {
  let total = 0
  for (const item of items) {
    if (item.inputType === 'count-only' || item.unit === '単位') total += calcGetAmountDirect(data, item)
    else total += calcGetCount(data, item) * calcGetPoints(data, item) * POINT_TO_YEN
  }
  return total
}

    function getAmount(item) { if (item.inputType==='count-only'||item.unit==='単位') return props.data.r6?.[item.id+'_amt'] ?? props.data.r6?.[item.id] ?? 0; const p=getPoints(item),c=getCount(item); if(p==null||c==null) return 0; return c*p*POINT_TO_YEN }

    function updateCount(item,v) { if(!props.data.r6) props.data.r6={}; props.data.r6[item.id+'_cnt']=v?Number(String(v).replace(/,/g,'')):0 }
    function fmtC(v) { return (v||0).toLocaleString() }
    function totalCount() { return props.items.filter(i=>!isDisabled(i)).reduce((s,i)=>s+getCount(i),0) }
    function totalAmount() { return props.items.filter(i=>!isDisabled(i)).reduce((s,i)=>s+getAmount(i),0) }

unt" class="num-cell" style="font-weight:700"><span class="amt-computed">{{fmtC(totalCount())}}</span></td><td v-if="showAmount" class="num-cell" style="font-weight:700"><span class="amt-computed">{{formatYen(totalAmount())}}</span></td></tr></tbody></table>`

// Main App
const app = createApp({
  components:{OverviewTab,InputTab,ImpactTab,TasksTab,RequirementsTab},
  setup() {
    const data = reactive(getDefaultData())
    const activeTab = ref('overview')

    // Load from localStorage
    const saved = localStorage.getItem(STORAGE_KEY)
    if (saved) { try { const p = JSON.parse(saved); for (const k of Object.keys(p)) data[k] = p[k] } catch{} }

    // Auto-save to localStorage
    watch(data, ()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)) }, {deep:true})

    function handleExport() {
      const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'})
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='houshu-kaitei-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url)
    }
    function handleImport() {
      const input = document.createElement('input'); input.type='file'; input.accept='.json'
      input.onchange = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); const merged = {...getDefaultData(), ...imported}; Object.keys(data).forEach(k=>delete data[k]); Object.assign(data, merged) } catch { alert('JSONファイルの読み込みに失敗しました') } }; reader.readAsText(file) }
      input.click()
    }

    async function loadR7Data() {
      try {
        const res = await fetch('data/r7_extracted.json')
        if (!res.ok) throw new Error('fetch failed: ' + res.status)
        const json = await res.json()
        if (!data.r6) data.r6 = {}
        // Merge r6 object (flat key-value pairs matching our field format)
        if (json.r6) { Object.assign(data.r6, json.r6) }
        // Merge basic indicators from raw_toukei
        if (json.raw_toukei?.basic_indicators) {
          const bi = json.raw_toukei.basic_indicators
          const map = { rx_count:'rx_count', rx_sheets:'rx_sheets', ge_rate:'ge_rate', zai_count:'zai_count', avg_zai:'avg_zai', total_reward:'total_reward', rx_price:'rx_price' }
          for (const [src, dst] of Object.entries(map)) { if (bi[src]?.current != null) data.r6[dst] = bi[src].current }
        }
        // Merge patient burden from raw_toukei
        if (json.raw_toukei?.patient_burden) {
          const pb = json.raw_toukei.patient_burden
          for (const key of ['hoken_futan','jihi_futan','hokengai_futan','sonota_kingaku','otc_kingaku','sentei_ryoyo']) { if (pb[key]?.current != null) data.r6[key] = pb[key].current }
        }
        // Merge techo data
        if (json.raw_toukei?.techo) {
          const t = json.raw_toukei.techo
          for (const key of ['techo_rate','rx_3month','rx_3month_techo']) { if (t[key]?.current != null) data.r6[key] = t[key].current }
        }
        // Merge pharmacy name and period
        if (json.pharmacyName) data.pharmacyName = json.pharmacyName
        console.log('実績データ読込完了:', json.pharmacyName, json.period)
      } catch (e) { console.error('実績データ読込失敗:', e.message) }
    }

    // Auto-load on first visit (no saved data)
    if (!saved) { loadR7Data().catch(() => {}) }

    provide('storage', { data })
    return { data, activeTab, handleExport, handleImport, loadR7Data }
  },
  template: `<div class="container"><div class="hero"><div><h1>令和8年度 調剤報酬改定</h1><p>2026年6月施行 報酬改定管理システム</p></div><div class="hero-actions"><button class="btn" style="color:white;border-color:rgba(255,255,255,0.3);background:transparent" @click="loadR7Data">実績読込</button><button class="btn" style="color:white;border-color:rgba(255,255,255,0.3);background:transparent" @click="handleExport">JSON保存</button><button class="btn" style="color:white;border-color:rgba(255,255,255,0.3);background:transparent" @click="handleImport">JSON読込</button></div></div><div class="tabs"><button class="tab" :class="{active:activeTab==='overview'}" @click="activeTab='overview'">概要</button><button class="tab" :class="{active:activeTab==='houshu'}" @click="activeTab='houshu'">報酬改定</button><button class="tab" :class="{active:activeTab==='impact'}" @click="activeTab='impact'">経営影響</button><button class="tab" :class="{active:activeTab==='tasks'}" @click="activeTab='tasks'">事務タスク</button><button class="tab" :class="{active:activeTab==='requirements'}" @click="activeTab='requirements'">施設基準</button></div><overview-tab v-if="activeTab==='overview'"/><input-tab v-if="activeTab==='houshu'" :data="data"/><impact-tab v-if="activeTab==='impact'" :data="data"/><tasks-tab v-if="activeTab==='tasks'" :data="data"/><requirements-tab v-if="activeTab==='requirements'" :data="data"/></div>`
})

app.mount('#app')
</script>
